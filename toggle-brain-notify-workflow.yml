# Copy this file to toggle-brain at: .github/workflows/notify-mcp.yml
# It triggers the toggle-mcp sync workflow whenever toggle-brain pushes to main.
#
# Required secret in toggle-brain repo: GH_PAT
#   Scopes: repo (full), workflow
#   This allows the workflow to dispatch events to toggle-mcp.

name: Notify toggle-mcp on push

on:
  push:
    branches: [main, master]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger toggle-mcp sync
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/toggle-workspace/toggle-mcp/dispatches \
            -d '{"event_type":"toggle-brain-updated"}'
