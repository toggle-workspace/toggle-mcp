name: Sync content from toggle-brain

on:
  repository_dispatch:
    types: [toggle-brain-updated]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          submodules: recursive

      - name: Update submodule to latest toggle-brain master
        run: |
          git submodule update --remote --merge content
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content
          git diff --staged --quiet || git commit -m "chore: sync toggle-brain content"
          git push

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      # Uncomment once Vercel secrets are configured
